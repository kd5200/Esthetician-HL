<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Signature glow facial">
  <defs>
    <linearGradient id="sigBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbe4d4"/>
      <stop offset="1" stop-color="#e9b9a6"/>
    </linearGradient>
    <radialGradient id="sigGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#sigBg)"/>
  <circle cx="300" cy="200" r="160" fill="url(#sigGlow)"/>
  <!-- starburst -->
  <g transform="translate(300 200)" stroke="#a85a44" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.55">
    <line x1="0" y1="-110" x2="0" y2="-70"/>
    <line x1="0" y1="110" x2="0" y2="70"/>
    <line x1="-110" y1="0" x2="-70" y2="0"/>
    <line x1="110" y1="0" x2="70" y2="0"/>
    <line x1="-78" y1="-78" x2="-50" y2="-50"/>
    <line x1="78" y1="78" x2="50" y2="50"/>
    <line x1="-78" y1="78" x2="-50" y2="50"/>
    <line x1="78" y1="-78" x2="50" y2="-50"/>
  </g>
  <circle cx="300" cy="200" r="40" fill="#fff" opacity="0.85"/>
  <circle cx="300" cy="200" r="22" fill="#c97a63"/>
</svg>
