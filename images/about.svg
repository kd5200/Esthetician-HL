<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Studio interior placeholder">
  <defs>
    <linearGradient id="aboutBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7d6c7"/>
      <stop offset="1" stop-color="#b06e58"/>
    </linearGradient>
    <radialGradient id="aboutGlow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#aboutBg)"/>
  <rect width="800" height="1000" fill="url(#aboutGlow)"/>

  <!-- arch window -->
  <path d="M260 220
           a140 140 0 0 1 280 0
           v460
           h-280 z"
        fill="#faf0e6" opacity="0.55"/>
  <path d="M260 220
           a140 140 0 0 1 280 0
           v460
           h-280 z"
        fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="3"/>

  <!-- vase -->
  <ellipse cx="400" cy="780" rx="80" ry="14" fill="#3a2520" opacity="0.25"/>
  <path d="M360 770
           c-10 -10 -15 -30 -10 -60
           l8 -50
           c2 -10 12 -16 22 -16
           h40
           c10 0 20 6 22 16
           l8 50
           c5 30 0 50 -10 60 z"
        fill="#c97a63"/>

  <!-- stems + leaves -->
  <path d="M400 680 C 390 600, 360 540, 340 500" stroke="#7a8d63" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M400 680 C 410 600, 440 540, 460 500" stroke="#7a8d63" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M400 680 C 400 590, 400 510, 400 460" stroke="#7a8d63" stroke-width="4" fill="none" stroke-linecap="round"/>
  <ellipse cx="335" cy="495" rx="22" ry="40" fill="#b9c9a4" transform="rotate(-30 335 495)"/>
  <ellipse cx="465" cy="495" rx="22" ry="40" fill="#b9c9a4" transform="rotate(30 465 495)"/>
  <ellipse cx="400" cy="455" rx="22" ry="40" fill="#cdd9b7"/>

  <!-- soft circle accents -->
  <circle cx="120" cy="150" r="60" fill="#ffffff" opacity="0.15"/>
  <circle cx="680" cy="880" r="80" fill="#ffffff" opacity="0.12"/>
</svg>
