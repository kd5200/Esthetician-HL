<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Clarifying acne facial">
  <defs>
    <linearGradient id="acneBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9d6c8"/>
      <stop offset="1" stop-color="#b08a78"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#acneBg)"/>
  <!-- leaf cluster -->
  <g transform="translate(300 220)">
    <ellipse cx="0" cy="-60" rx="22" ry="55" fill="#8aa477"/>
    <ellipse cx="-50" cy="-30" rx="22" ry="55" fill="#9ab388" transform="rotate(-35 -50 -30)"/>
    <ellipse cx="50" cy="-30" rx="22" ry="55" fill="#9ab388" transform="rotate(35 50 -30)"/>
    <ellipse cx="-70" cy="30" rx="22" ry="55" fill="#7a9468" transform="rotate(-65 -70 30)"/>
    <ellipse cx="70" cy="30" rx="22" ry="55" fill="#7a9468" transform="rotate(65 70 30)"/>
    <circle cx="0" cy="0" r="14" fill="#fbe4d4"/>
  </g>
  <!-- bubbles -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="120" cy="120" r="10"/>
    <circle cx="160" cy="90" r="6"/>
    <circle cx="490" cy="310" r="12"/>
    <circle cx="450" cy="340" r="6"/>
  </g>
</svg>
