<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Daily routine">
  <defs>
    <linearGradient id="routineBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbe4d4"/>
      <stop offset="1" stop-color="#e9b9a6"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#routineBg)"/>
  <!-- 4 bottles in a row -->
  <g transform="translate(80 130)">
    <g>
      <rect x="0" y="20" width="70" height="160" rx="10" fill="#fff" opacity="0.92"/>
      <rect x="22" y="0" width="26" height="22" rx="4" fill="#a85a44"/>
      <rect x="10" y="80" width="50" height="36" fill="#fbe4d4"/>
      <text x="35" y="104" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a85a44" font-style="italic">cleanse</text>
    </g>
    <g transform="translate(110 0)">
      <rect x="0" y="20" width="70" height="160" rx="10" fill="#fff" opacity="0.92"/>
      <rect x="22" y="0" width="26" height="22" rx="4" fill="#c97a63"/>
      <rect x="10" y="80" width="50" height="36" fill="#fbe4d4"/>
      <text x="35" y="104" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a85a44" font-style="italic">serum</text>
    </g>
    <g transform="translate(220 0)">
      <rect x="0" y="20" width="70" height="160" rx="10" fill="#fff" opacity="0.92"/>
      <rect x="22" y="0" width="26" height="22" rx="4" fill="#a85a44"/>
      <rect x="10" y="80" width="50" height="36" fill="#fbe4d4"/>
      <text x="35" y="104" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a85a44" font-style="italic">moisturize</text>
    </g>
    <g transform="translate(330 0)">
      <rect x="0" y="20" width="70" height="160" rx="10" fill="#fff" opacity="0.92"/>
      <rect x="22" y="0" width="26" height="22" rx="4" fill="#c97a63"/>
      <rect x="10" y="80" width="50" height="36" fill="#fbe4d4"/>
      <text x="35" y="104" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a85a44" font-style="italic">spf</text>
    </g>
  </g>
</svg>
