<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Ultra-hydration facial">
  <defs>
    <linearGradient id="hydBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dceaf0"/>
      <stop offset="1" stop-color="#a9c5d2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#hydBg)"/>
  <!-- main droplet -->
  <path d="M300 90
           c40 60 80 110 80 160
           a80 80 0 0 1 -160 0
           c0 -50 40 -100 80 -160 z"
        fill="#ffffff" opacity="0.85"/>
  <path d="M300 130
           c20 40 50 70 50 100
           a50 50 0 0 1 -100 0
           c0 -30 30 -60 50 -100 z"
        fill="#7ea8b9" opacity="0.4"/>
  <!-- small droplets -->
  <path d="M150 280 c12 18 24 33 24 48 a24 24 0 0 1 -48 0 c0 -15 12 -30 24 -48 z" fill="#ffffff" opacity="0.7"/>
  <path d="M460 320 c10 14 18 26 18 38 a18 18 0 0 1 -36 0 c0 -12 8 -24 18 -38 z" fill="#ffffff" opacity="0.6"/>
  <path d="M470 110 c8 12 16 22 16 32 a16 16 0 0 1 -32 0 c0 -10 8 -20 16 -32 z" fill="#ffffff" opacity="0.5"/>
</svg>
