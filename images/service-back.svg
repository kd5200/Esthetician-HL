<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Back facial">
  <defs>
    <linearGradient id="backBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4ddd1"/>
      <stop offset="1" stop-color="#c79078"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#backBg)"/>
  <!-- back silhouette -->
  <path d="M300 80
           c40 0 60 30 60 60
           c0 20 -10 30 -10 50
           c30 10 60 40 60 100
           v60
           c0 20 -15 30 -30 30
           h-160
           c-15 0 -30 -10 -30 -30
           v-60
           c0 -60 30 -90 60 -100
           c0 -20 -10 -30 -10 -50
           c0 -30 20 -60 60 -60 z"
        fill="#b97462" opacity="0.85"/>
  <!-- shoulder light -->
  <path d="M260 130 q40 -20 80 0 q-40 -10 -80 0 z" fill="#ffffff" opacity="0.35"/>
  <!-- towel -->
  <rect x="200" y="280" width="200" height="80" rx="10" fill="#faf0e6"/>
  <line x1="220" y1="300" x2="380" y2="300" stroke="#e9b9a6" stroke-width="2"/>
</svg>
