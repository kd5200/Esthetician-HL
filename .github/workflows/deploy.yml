name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_CONTACT_WEBHOOK_URL: ${{ secrets.VITE_CONTACT_WEBHOOK_URL }}
          VITE_BOOKING_URL: ${{ secrets.VITE_BOOKING_URL }}
          VITE_BOOKING_DEPOSIT_PERCENT: ${{ secrets.VITE_BOOKING_DEPOSIT_PERCENT }}
          VITE_BOOKING_DEPOSIT_MINIMUM: ${{ secrets.VITE_BOOKING_DEPOSIT_MINIMUM }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: aws s3 sync dist/ "s3://${{ secrets.AWS_S3_BUCKET }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

      - name: Summary
        run: |
          echo "### Deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Bucket:** \`${{ secrets.AWS_S3_BUCKET }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CloudFront:** \`${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}\`" >> "$GITHUB_STEP_SUMMARY"
